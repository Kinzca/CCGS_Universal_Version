# 架构决策注册表 (Architecture Decision Registry)
#
# 用途：跨 ADR 共享的架构立场的唯一真源。
# Skill 在编写新 ADR 前检查此表，避免在编写阶段就产生矛盾。
#
# 规则：
#   - 仅当一个立场约束了其他系统的构建方式时才注册。
#   - 不要删除条目——设置 status: superseded_by: ADR-NNNN 代替。
#   - 立场变更时：更新条目，设置 revised: 为当天日期，注释旧值。
#
# 写入者：/architecture-decision (ADR 审批后)
# 读取者：/architecture-decision (编写前冲突检查)
#          /architecture-review (跨 ADR 冲突基线)
#          /create-stories (嵌入架构约束到 Story)
#          /dev-story (实现时校验已接受立场)
#
# 路径约定：本项目 ADR 位于 .agents/project-docs/architecture/

version: 1
last_updated: ""

# ─── 状态所有权 ────────────────────────────────────────────────────────────
# 谁是每块共享游戏状态的权威拥有者。
state_ownership: []

# 示例：
# state_ownership:
#   - state: tower_window_state
#     status: active
#     owner_system: tower-generation
#     adr: .agents/project-docs/architecture/adr-0001-tower-generation.md
#     interface: "TowerWindowGenerationResult (只读结构体)"
#     write_access: tower-generation-only
#     referenced_by: []
#     added: 2026-04-23
#     revised: ""

# ─── 接口契约 ────────────────────────────────────────────────────────────────
# 系统间的通信方式约定。
interfaces: []

# ─── 性能预算 ────────────────────────────────────────────────────────────────
# 每个系统的帧时间分配。
performance_budgets: []

# 示例：
# performance_budgets:
#   - target_fps: 60
#     total_frame_budget_ms: 16.67
#     platform: PC
#     added: 2026-04-23
#   - system: tower-generation
#     status: active
#     budget_ms: 3.0
#     notes: "包含窗口生成、求解验证、打乱步数计算"
#     added: 2026-04-23

# ─── API 决策 ────────────────────────────────────────────────────────────────
# 项目级的引擎 API 选型决策。
api_decisions: []

# ─── 禁止模式 ────────────────────────────────────────────────────────────────
# 已接受 ADR 明确禁止的架构反模式。
forbidden_patterns: []

