# 追溯性需求注册表 (Traceability Requirement Registry)
#
# 用途：稳定的需求 ID（如 TR-TWR-001），将 GDD 需求链接到 Story。
#
# 规则：
#   - 已有 ID 永不重编号——只能追加新 ID
#   - 每个 TR-ID 唯一映射一条 GDD 需求
#   - Story 文件通过 TR-ID 引用需求（而非引用 GDD 原文，保持新鲜度）
#
# 写入者：/architecture-review Phase 8
# 读取者：/create-stories (嵌入 TR-ID 到 Story)
#          /story-done (校验完成度)

