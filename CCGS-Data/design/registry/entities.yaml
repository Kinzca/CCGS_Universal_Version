#     expression: "CSR = challenge_level / player_skill"
#     notes: "目标 CSR ≈ 1.04，维持心流通道"
#     added: 2026-04-23
#     revised: ""

# ─── 常量 ────────────────────────────────────────────────────────────────────
# 跨多个系统引用的命名数值常量。
constants: []

