<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCGS Project Dashboard</title>
    <style>
        :root {
            --bg-color: #0F172A;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --cyan: #06B6D4;
            --purple: #8B5CF6;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            box-sizing: border-box;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            height: calc(100vh - 4rem);
        }

        .header {
            grid-column: 1 / -1;
            padding: 1rem 0;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 1rem;
        }
        
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header h1 span {
            color: var(--cyan);
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        .chart-container {
            flex-grow: 1;
            display: flex;
            align-items: flex-end;
            padding-bottom: 2rem;
            gap: 1rem;
            position: relative;
        }

        .bar {
            flex: 1;
            background: linear-gradient(to top, var(--purple), var(--cyan));
            border-radius: 4px 4px 0 0;
            transition: height 1s ease-out;
            min-height: 5%;
        }

        /* Bug List */
        .bug-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
        }

        .bug-item {
            display: flex;
            justify-content: space-between;
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
            align-items: center;
        }

        .bug-priority {
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .priority-high { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .priority-low { background: rgba(234, 179, 8, 0.2); color: #eab308; }

        /* Health */
        .health-stats {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        
        .stat-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 8px solid var(--glass-border);
            border-top-color: var(--cyan);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }
        
        .stat-circle.purple {
            border-top-color: var(--purple);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.2);
        }

        .stat-num { font-size: 2rem; font-weight: bold; }
        .stat-label { font-size: 0.9rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="dashboard-grid">
        <div class="header">
            <h1><span>CCGS</span> Cyber-Agile Dashboard</h1>
            <div id="sprint-title" style="color: var(--text-muted); margin-top: 0.5rem;">Loading sprint data...</div>
        </div>

        <div class="card" style="grid-row: span 1;">
            <h2>Burn-down Chart</h2>
            <div class="chart-container" id="chart">
                <!-- Bars injected by JS -->
            </div>
        </div>

        <div class="card" style="grid-row: span 2;">
            <h2>Project Health</h2>
            <div class="health-stats">
                <div class="stat-circle">
                    <span class="stat-num" id="todo-count">0</span>
                    <span class="stat-label">TODOs</span>
                </div>
                <div class="stat-circle purple">
                    <span class="stat-num" id="fixme-count">0</span>
                    <span class="stat-label">FIXMEs</span>
                </div>
            </div>
        </div>

        <div class="card" style="grid-row: span 1;">
            <h2>Active Bugs</h2>
            <ul class="bug-list" id="bug-list">
                <!-- Bugs injected by JS -->
            </ul>
        </div>
    </div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('sprint-title').textContent = 'Active Sprint: ' + data.sprint.name;
                
                // Chart
                const chart = document.getElementById('chart');
                data.sprint.burn_data.forEach(val => {
                    const bar = document.createElement('div');
                    bar.className = 'bar';
                    bar.style.height = val + '%';
                    chart.appendChild(bar);
                });

                // Bugs
                const list = document.getElementById('bug-list');
                data.bugs.forEach(bug => {
                    const li = document.createElement('li');
                    li.className = 'bug-item';
                    const prioClass = bug.priority === 'High' ? 'priority-high' : 'priority-low';
                    li.innerHTML = `
                        <div>
                            <strong>${bug.id}</strong>
                            <div style="font-size: 0.9rem; color: var(--text-muted)">${bug.title}</div>
                        </div>
                        <span class="bug-priority ${prioClass}">${bug.priority}</span>
                    `;
                    list.appendChild(li);
                });

                // Health
                document.getElementById('todo-count').textContent = data.health.TODOs;
                document.getElementById('fixme-count').textContent = data.health.FIXMEs;
            });
    </script>
</body>
</html>
