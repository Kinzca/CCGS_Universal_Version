<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCGS Project Dashboard</title>
    <style>
        :root {
            --bg-color: #0F172A;
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --cyan: #06B6D4;
            --purple: #8B5CF6;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            box-sizing: border-box;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.1), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.1), transparent 30%);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            grid-column: 1 / -1;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        
        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header h1 span { color: var(--cyan); }
        .header .subtitle { color: var(--text-muted); font-size: 1.1rem; }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        /* Top Row Stats */
        .stat-card {
            align-items: center;
            justify-content: flex-start;
            height: 200px;
        }

        .stat-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 6px solid var(--glass-border);
            border-top-color: var(--cyan);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
        }
        
        .stat-circle.purple {
            border-top-color: var(--purple);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.15);
        }

        .stat-num { font-size: 2.2rem; font-weight: bold; line-height: 1;}
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px;}

        /* Chart */
        .card-chart {
            grid-column: 1 / -1;
            height: 350px;
        }
        
        .chart-container {
            flex-grow: 1;
            display: flex;
            align-items: flex-end;
            gap: 1.5rem;
            height: calc(100% - 3rem);
        }

        .bar-wrapper {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .bar {
            background: linear-gradient(to top, rgba(139, 92, 246, 0.8), rgba(6, 182, 212, 0.8));
            border-radius: 6px 6px 0 0;
            transition: height 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 5%;
            width: 100%;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
            position: relative;
        }
        
        .bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: rgba(255,255,255,0.4);
            border-radius: 6px 6px 0 0;
        }

        /* Bugs */
        .card-bugs {
            grid-column: 1 / -1;
        }

        .bug-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .bug-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: transform 0.2s, background 0.2s;
        }
        
        .bug-item:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.06);
        }

        .bug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bug-priority {
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .priority-high { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .priority-low { background: rgba(234, 179, 8, 0.15); color: #eab308; border: 1px solid rgba(234, 179, 8, 0.3); }

    </style>
</head>
<body>
    <div class="dashboard-grid">
        <div class="header">
            <h1><span>CCGS</span> Cyber-Agile Dashboard</h1>
            <div class="subtitle" id="sprint-title">Loading...</div>
        </div>

        <!-- Top Row Stats -->
        <div class="card stat-card">
            <h2>Sprint Velocity</h2>
            <div class="stat-circle">
                <span class="stat-num" id="sprint-pts">0</span>
                <span class="stat-label">Points</span>
            </div>
        </div>
        
        <div class="card stat-card">
            <h2>Code Debt (TODO)</h2>
            <div class="stat-circle">
                <span class="stat-num" id="todo-count">0</span>
                <span class="stat-label">Pending</span>
            </div>
        </div>

        <div class="card stat-card">
            <h2>Code Debt (FIXME)</h2>
            <div class="stat-circle purple">
                <span class="stat-num" id="fixme-count">0</span>
                <span class="stat-label">Critical</span>
            </div>
        </div>

        <!-- Chart Row -->
        <div class="card card-chart">
            <h2>Burn-down Chart (Last 7 Days)</h2>
            <div class="chart-container" id="chart">
                <!-- Bars injected by JS -->
            </div>
        </div>

        <!-- Bugs Row -->
        <div class="card card-bugs">
            <h2>Active Tracking Bugs</h2>
            <div class="bug-list" id="bug-list">
                <!-- Bugs injected by JS -->
            </div>
        </div>
    </div>

    <script>
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('sprint-title').textContent = 'Active Sprint: ' + data.sprint.name;
                document.getElementById('sprint-pts').textContent = data.sprint.completed_points;
                
                // Chart
                const chart = document.getElementById('chart');
                data.sprint.burn_data.forEach(val => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'bar-wrapper';
                    
                    const bar = document.createElement('div');
                    bar.className = 'bar';
                    // Animate height after short delay
                    setTimeout(() => {
                        bar.style.height = val + '%';
                    }, 100);
                    
                    wrapper.appendChild(bar);
                    chart.appendChild(wrapper);
                });

                // Bugs
                const list = document.getElementById('bug-list');
                data.bugs.forEach(bug => {
                    const li = document.createElement('div');
                    li.className = 'bug-item';
                    const prioClass = bug.priority === 'High' ? 'priority-high' : 'priority-low';
                    li.innerHTML = `
                        <div class="bug-header">
                            <strong style="color: var(--text-main); font-size: 0.95rem;">${bug.id}</strong>
                            <span class="bug-priority ${prioClass}">${bug.priority}</span>
                        </div>
                        <div style="font-size: 0.85rem; color: var(--text-muted)">${bug.title}</div>
                    `;
                    list.appendChild(li);
                });

                // Health
                document.getElementById('todo-count').textContent = data.health.TODOs;
                document.getElementById('fixme-count').textContent = data.health.FIXMEs;
            });
    </script>
</body>
</html>
